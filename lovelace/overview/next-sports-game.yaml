type: custom:button-card
entity: maestro.next_sports_game
show_icon: false
show_name: false
styles:
  card:
    - height: 100px
  grid:
    - grid-template-areas: '"h_crest top_row a_crest" "h_crest date a_crest" "h_crest time a_crest"'
    - grid-template-columns: 1fr 1fr 1fr
    - grid-template-rows: 1fr 1fr 1fr
  custom_fields:
    h_crest:
      - display: inline-grid
      - place-self: center
      - align-self: flex-start
    top_row:
      - display: inline-grid
      - align-self: center
      - overflow: visible
    date:
      - display: inline-grid
      - align-self: center
      - overflow: visible
    time:
      - display: inline-grid
      - align-self: center
    a_crest:
      - display: inline-grid
      - place-self: center
      - align-self: flex-start
custom_fields:
  # h_crest: '[[[ return `<img id="icon" src="${entity.attributes.home_path}" style="position: relative;">` ]]]'
  # top_row: "[[[ return `<span>${entity.attributes.top_row}</span>`]]]"
  # date: "[[[ return `<span>${entity.attributes.date}</span>` ]]]"
  # time: "[[[ return `<span>${entity.attributes.time}</span>` ]]]"
  # a_crest: '[[[ return `<img id="icon"src="${entity.attributes.away_path}" style="position: relative;">` ]]]'
  h_crest: "Temp"
  top_row: "Temp"
  date: "Temp"
  time: "Temp"
  a_crest: "Temp"
